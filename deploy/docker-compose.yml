services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./temps/interview_pilot.db
      SECRET_KEY: please-change-this-secret-key-in-real-deploy
      CACHE_BACKEND: redis
      MESSAGE_QUEUE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      ENABLE_BACKGROUND_WORKER: "true"
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ../temps:/app/temps

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
